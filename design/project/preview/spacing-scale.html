<!doctype html>
<!-- @dsCard group="Brand" name="Spacing scale" subtitle="4-pt grid · –space-1 → –space-20" viewport="700x340" -->
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .row { display:flex; align-items:center; gap:14px; padding:4px 0; font-family:var(--font-mono); font-size:11px; color:var(--fg-2); }
  .row .name { width:90px; color:var(--fg-1); font-weight:600; }
  .row .val { width:60px; color:var(--fg-muted); }
  .row .bar { height:16px; background:var(--accent); border-radius:3px; }
</style></head><body>
<div class="pv-card">
  <div class="pv-label">Spacing · 4-pt grid</div>
  <div class="row"><span class="name">--space-1</span><span class="val">4px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="name">--space-2</span><span class="val">8px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="name">--space-3</span><span class="val">12px</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="name">--space-4</span><span class="val">16px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="name">--space-5</span><span class="val">20px</span><span class="bar" style="width:20px"></span></div>
  <div class="row"><span class="name">--space-6</span><span class="val">24px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="name">--space-8</span><span class="val">32px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="name">--space-10</span><span class="val">40px</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="name">--space-12</span><span class="val">48px</span><span class="bar" style="width:48px"></span></div>
  <div class="row"><span class="name">--space-16</span><span class="val">64px</span><span class="bar" style="width:64px"></span></div>
  <div class="row"><span class="name">--space-20</span><span class="val">80px</span><span class="bar" style="width:80px"></span></div>
</div>
</body></html>
