<!doctype html>
<!-- @dsCard group="Brand" name="Badges & chips" subtitle="Trust badge + status chips" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Badges & chips</title>
<link rel="stylesheet" href="_preview.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  .trust { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.2); border-radius:9999px; font-size:14px; font-weight:500; color:#991b1b; }
  .trust i.success { color:#16a34a; }
  .chip { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:9999px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .chip.online { background:rgba(34,197,94,.1); color:#16a34a; }
  .chip.emergency { background:rgba(239,68,68,.1); color:#dc2626; }
  .chip.gps { background:rgba(59,130,246,.1); color:#1d4ed8; }
  .chip.neutral { background:var(--bg-3); color:var(--fg-2); }
  .group { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); margin-bottom:6px; }
</style></head><body>
<div class="pv-card">
  <div class="pv-label">Badges, chips, trust signals</div>

  <div class="lbl">Trust badge · paired with the H1</div>
  <div class="group">
    <span class="trust"><i class="bi bi-shield-check success"></i> Trusted by 50,000+ families</span>
  </div>

  <div class="lbl">Status chips</div>
  <div class="group">
    <span class="chip online"><i class="bi bi-circle-fill" style="font-size:8px"></i> Online</span>
    <span class="chip emergency"><i class="bi bi-exclamation-triangle-fill" style="font-size:9px"></i> Emergency</span>
    <span class="chip gps"><i class="bi bi-geo-alt-fill" style="font-size:9px"></i> GPS active</span>
    <span class="chip neutral">HIPAA</span>
    <span class="chip neutral">ISO 27001</span>
    <span class="chip neutral">24/7</span>
  </div>
</div>
</body></html>
