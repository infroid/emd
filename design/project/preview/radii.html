<!doctype html>
<!-- @dsCard group="Brand" name="Radii" subtitle="6 / 8 / 12 / 16 / 24 / pill — 12 + 24 are signature" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .row { display:flex; gap:14px; align-items:flex-end; }
  .item { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .swatch { width:90px; height:64px; background:var(--bg-2); border:1px solid var(--border-1); }
  .star { background:var(--accent-soft); border-color:var(--emd-red-200); }
  .tok { font-family:var(--font-mono); font-size:10px; color:var(--fg-muted); text-align:center; line-height:1.4; }
  .tok b { color:var(--fg-1); display:block; }
</style></head><body>
<div class="pv-card">
  <div class="pv-label">Border radii · soft, never circular</div>
  <div class="row">
    <div class="item"><div class="swatch" style="border-radius:6px"></div><div class="tok"><b>--radius-sm</b>6px · chips</div></div>
    <div class="item"><div class="swatch" style="border-radius:8px"></div><div class="tok"><b>--radius-md</b>8px · inputs</div></div>
    <div class="item"><div class="swatch star" style="border-radius:12px"></div><div class="tok"><b>--radius-lg ★</b>12px · buttons</div></div>
    <div class="item"><div class="swatch" style="border-radius:16px"></div><div class="tok"><b>--radius-xl</b>16px · toasts</div></div>
    <div class="item"><div class="swatch star" style="border-radius:24px"></div><div class="tok"><b>--radius-2xl ★</b>24px · cards</div></div>
    <div class="item"><div class="swatch" style="border-radius:9999px;width:90px;height:40px"></div><div class="tok"><b>--radius-full</b>pill · badges</div></div>
  </div>
</div>
</body></html>
