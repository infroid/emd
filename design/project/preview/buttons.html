<!doctype html>
<!-- @dsCard group="Brand" name="Buttons" subtitle="Gradient bodies, tinted halos, micro-springs on hover" viewport="700x460" -->
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_preview.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { background: var(--bg-1); }
  .pv-card { padding: 24px; }

  .lbl {
    font-family: var(--font-mono); font-size: 9px;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--fg-muted);
    margin: 0 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .lbl::after { content: ''; flex: 1; height: 1px; background: var(--border-1); }
  .lbl + .lbl { margin-top: 18px; }
  .group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }

  /* ---- Modern button base ----
     Built like a physical key:
       - subtle vertical gradient body
       - hairline top highlight (rgba white inset)
       - tinted halo shadow that grows on hover
       - micro-translate on press
  */
  .btn {
    --ring: 0 0 0 0 transparent;
    --halo: 0 0 0 transparent;
    position: relative;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 18px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14px;
    line-height: 1;
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    transition:
      transform .18s cubic-bezier(.34,1.56,.64,1),
      box-shadow .25s ease,
      background .2s ease,
      color .2s ease,
      border-color .2s ease;
    text-decoration: none;
    white-space: nowrap;
    isolation: isolate;
  }
  .btn:focus-visible { outline: none; box-shadow: var(--ring), 0 0 0 3px rgba(220,38,38,.35); }
  .btn .arrow { transition: transform .25s cubic-bezier(.34,1.56,.64,1); font-size: 14px; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* Primary — gradient body, top highlight, tinted halo */
  .btn-primary {
    background: linear-gradient(180deg, #ef4444 0%, #c52121 100%);
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.25),
      inset 0 -1px 0 rgba(0,0,0,.15),
      0 1px 2px rgba(220,38,38,.40),
      0 4px 14px rgba(220,38,38,.30);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    background: linear-gradient(180deg, #f55757 0%, #b91c1c 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.30),
      inset 0 -1px 0 rgba(0,0,0,.18),
      0 2px 4px rgba(220,38,38,.45),
      0 10px 24px rgba(220,38,38,.40);
  }
  .btn-primary:active { transform: translateY(0); box-shadow: inset 0 2px 4px rgba(0,0,0,.20), 0 1px 2px rgba(220,38,38,.40); }

  /* Secondary — frosted, soft elevation */
  .btn-secondary {
    background: #fff;
    color: var(--fg-1);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.8),
      inset 0 0 0 1px var(--border-1),
      0 1px 2px rgba(15,23,42,.04),
      0 2px 8px rgba(15,23,42,.06);
  }
  .btn-secondary:hover {
    transform: translateY(-1px);
    color: var(--accent-text);
    box-shadow:
      inset 0 0 0 1px rgba(220,38,38,.5),
      0 2px 4px rgba(15,23,42,.06),
      0 8px 20px rgba(220,38,38,.10);
  }

  /* Ghost — minimal, text-led */
  .btn-ghost {
    background: transparent;
    color: var(--fg-2);
    padding: 11px 14px;
  }
  .btn-ghost:hover { background: var(--bg-3); color: var(--fg-1); }

  /* Outline — accent border, fills on hover */
  .btn-outline {
    background: transparent;
    color: var(--accent);
    box-shadow: inset 0 0 0 1.5px var(--accent);
  }
  .btn-outline:hover {
    background: var(--accent);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: inset 0 0 0 1.5px var(--accent), 0 6px 18px rgba(220,38,38,.25);
  }

  /* Emergency — signature gradient + pulse halo */
  .btn-emergency {
    padding: 14px 24px;
    font-size: 15px;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff5252 0%, #dc2626 60%, #9b1717 100%);
    color: #fff;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.28),
      0 1px 2px rgba(220,38,38,.5),
      0 8px 24px rgba(220,38,38,.40),
      0 0 0 6px rgba(220,38,38,.10);
  }
  .btn-emergency:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.35),
      0 2px 4px rgba(220,38,38,.55),
      0 14px 32px rgba(220,38,38,.50),
      0 0 0 8px rgba(220,38,38,.12);
  }

  /* Pill — fully rounded variant */
  .btn-pill { border-radius: 9999px; padding-left: 22px; padding-right: 22px; }

  /* Icon-only round */
  .btn-icon {
    width: 44px; height: 44px; padding: 0;
    border-radius: 50%;
    justify-content: center;
    background: #fff;
    color: var(--fg-1);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.8),
      inset 0 0 0 1px var(--border-1),
      0 1px 2px rgba(15,23,42,.04),
      0 4px 12px rgba(15,23,42,.06);
  }
  .btn-icon i { font-size: 18px; }
  .btn-icon:hover { transform: translateY(-1px) rotate(-3deg); color: var(--accent); box-shadow: inset 0 0 0 1px rgba(220,38,38,.4), 0 6px 16px rgba(220,38,38,.18); }

  /* Sizes */
  .btn-sm { padding: 8px 14px; font-size: 12.5px; border-radius: 10px; }
  .btn-lg { padding: 14px 24px; font-size: 15px; border-radius: 14px; }

  /* Loading state */
  .btn.loading { pointer-events: none; }
  .btn.loading .label { opacity: 0; }
  .btn.loading::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 16px; height: 16px;
    margin: -8px 0 0 -8px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Disabled */
  .btn[disabled] { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .swatch-row { display: grid; grid-template-columns: 1fr; gap: 14px; }
  .hint {
    font-size: 11px; color: var(--fg-muted); margin-left: 8px;
    font-family: var(--font-mono);
  }
</style></head><body>

<div class="pv-card">

  <div class="lbl">Primary · gradient body, brand-tinted halo</div>
  <div class="group">
    <button class="btn btn-primary"><span class="label">Get Protected Now</span><i class="bi bi-arrow-right arrow"></i></button>
    <button class="btn btn-primary btn-pill"><i class="bi bi-shield-check"></i><span class="label">Activate Vault</span></button>
    <button class="btn btn-primary loading"><span class="label">Loading</span></button>
    <button class="btn btn-primary" disabled><span class="label">Disabled</span></button>
  </div>

  <div class="lbl">Secondary · frosted, dual hairline</div>
  <div class="group">
    <button class="btn btn-secondary"><i class="bi bi-play-circle"></i><span class="label">See How It Works</span></button>
    <button class="btn btn-outline"><span class="label">Book a Demo</span><i class="bi bi-arrow-right arrow"></i></button>
    <button class="btn btn-ghost"><span class="label">Maybe later</span></button>
  </div>

  <div class="lbl">Emergency · signature</div>
  <div class="group">
    <button class="btn btn-emergency"><i class="bi bi-exclamation-triangle-fill"></i><span class="label">Emergency</span></button>
    <button class="btn btn-emergency btn-pill" style="padding-left:18px"><i class="bi bi-telephone-fill"></i><span class="label">Call SOS</span></button>
  </div>

  <div class="lbl">Icon · 44px tap target</div>
  <div class="group">
    <button class="btn btn-icon" aria-label="Search"><i class="bi bi-search"></i></button>
    <button class="btn btn-icon" aria-label="Translate"><i class="bi bi-translate"></i></button>
    <button class="btn btn-icon" aria-label="Theme"><i class="bi bi-moon-stars-fill"></i></button>
    <button class="btn btn-icon" aria-label="More"><i class="bi bi-three-dots"></i></button>
    <span class="hint">hover to lift + tilt</span>
  </div>

  <div class="lbl">Sizes</div>
  <div class="group">
    <button class="btn btn-primary btn-sm"><span class="label">Small</span></button>
    <button class="btn btn-primary"><span class="label">Default</span></button>
    <button class="btn btn-primary btn-lg"><span class="label">Large</span></button>
  </div>

</div>

</body></html>
