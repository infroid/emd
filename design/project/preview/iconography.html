<!doctype html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Bootstrap Icons 1.11.3 — only icon system in use" viewport="700x260" -->
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_preview.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; }
  .tile { aspect-ratio:1; border:1px solid var(--border-1); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px; padding:6px; background:#fff; }
  .tile i { font-size:22px; color:var(--fg-1); }
  .tile .n { font-family:var(--font-mono); font-size:8px; color:var(--fg-muted); text-align:center; line-height:1; word-break:break-all; }
</style></head><body>
<div class="pv-card">
  <div class="pv-label">Bootstrap Icons 1.11.3 · <code style="font-family:var(--font-mono);font-size:10px;background:var(--bg-3);padding:2px 6px;border-radius:4px;">.bi .bi-name</code></div>
  <div class="grid">
    <div class="tile"><i class="bi bi-heart-pulse-fill"></i><div class="n">heart-pulse-fill</div></div>
    <div class="tile"><i class="bi bi-file-medical-fill"></i><div class="n">file-medical-fill</div></div>
    <div class="tile"><i class="bi bi-chat-dots-fill"></i><div class="n">chat-dots-fill</div></div>
    <div class="tile"><i class="bi bi-apple"></i><div class="n">apple</div></div>
    <div class="tile"><i class="bi bi-shield-fill-check"></i><div class="n">shield-fill-check</div></div>
    <div class="tile"><i class="bi bi-lightning-charge-fill"></i><div class="n">lightning-charge-fill</div></div>
    <div class="tile"><i class="bi bi-geo-alt-fill"></i><div class="n">geo-alt-fill</div></div>
    <div class="tile"><i class="bi bi-telephone-fill"></i><div class="n">telephone-fill</div></div>
    <div class="tile"><i class="bi bi-people-fill"></i><div class="n">people-fill</div></div>
    <div class="tile"><i class="bi bi-exclamation-triangle-fill"></i><div class="n">exclamation-triangle-fill</div></div>
    <div class="tile"><i class="bi bi-headset"></i><div class="n">headset</div></div>
    <div class="tile"><i class="bi bi-clock"></i><div class="n">clock</div></div>
    <div class="tile"><i class="bi bi-arrow-right-circle"></i><div class="n">arrow-right-circle</div></div>
    <div class="tile"><i class="bi bi-translate"></i><div class="n">translate</div></div>
    <div class="tile"><i class="bi bi-sun-fill"></i><div class="n">sun-fill</div></div>
    <div class="tile"><i class="bi bi-moon-stars-fill"></i><div class="n">moon-stars-fill</div></div>
  </div>
</div>
</body></html>
