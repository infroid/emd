<!doctype html>
<!-- @dsCard group="Brand" name="Stat cluster" subtitle="Three numbers + label, display 700" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Stat strip</title>
<link rel="stylesheet" href="_preview.css"></head><body>
<div class="pv-card">
  <div class="pv-label">Stat cluster · the proof under the hero</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:32px;padding:16px 0;">
    <div style="text-align:center">
      <div style="font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1;color:#991b1b;">&lt;5 min</div>
      <div style="font-size:13px;color:var(--fg-2);margin-top:8px;">Avg. Response</div>
    </div>
    <div style="text-align:center;border-left:1px solid var(--border-1);border-right:1px solid var(--border-1);">
      <div style="font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1;color:#991b1b;">400+</div>
      <div style="font-size:13px;color:var(--fg-2);margin-top:8px;">Lives Saved</div>
    </div>
    <div style="text-align:center">
      <div style="font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1;color:#991b1b;">100+</div>
      <div style="font-size:13px;color:var(--fg-2);margin-top:8px;">Cities Covered</div>
    </div>
  </div>
  <div style="margin-top:8px;font-size:12px;color:var(--fg-2);line-height:1.4;">Numbers in display weight 700, in <strong style="color:#991b1b">--accent-text</strong>. Labels in body sm, secondary. Always 3 stats — never 2, never 4.</div>
</div>
</body></html>
