<!doctype html>
<!-- @dsCard group="Brand" name="Form inputs" subtitle="2px border · 12px radius · red focus ring" viewport="700x280" -->
<html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="_preview.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { background: var(--bg-1); }
  .pv-card { padding: 28px 32px; }

  .form-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--border-1);
    padding-bottom: 14px;
  }
  .form-head .title {
    font-family: var(--font-display); font-weight: 800;
    font-size: 22px; letter-spacing: -0.02em;
    color: var(--fg-1);
  }
  .form-head .progress {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg-muted);
  }
  .form-head .progress b { color: var(--accent); font-weight: 700; }

  /* ---- Field — borderless, big text, animated underline ---- */
  .field {
    position: relative;
    padding: 14px 0 12px;
    border-bottom: 1.5px solid var(--border-1);
    transition: border-color .2s ease;
  }
  .field + .field { margin-top: 4px; }

  .field .lbl {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field .lbl .idx { color: var(--accent); font-weight: 700; }
  .field .lbl .req { color: var(--accent); margin-left: 2px; }
  .field .lbl .helper {
    margin-left: auto;
    color: var(--fg-muted);
    text-transform: none;
    letter-spacing: 0.04em;
    font-size: 10px;
  }

  .field .input-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .field input {
    flex: 1;
    border: 0;
    background: transparent;
    padding: 0;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--fg-1);
    outline: none;
    min-width: 0;
  }
  .field input::placeholder {
    color: var(--fg-muted);
    font-weight: 500;
  }

  /* Right-side status indicator */
  .field .status {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .2s ease;
  }
  .field .status.ok { background: rgba(22,163,74,.12); color: #16a34a; }
  .field .status.err { background: rgba(220,38,38,.12); color: #dc2626; }

  /* Animated focus accent bar */
  .field::after {
    content: '';
    position: absolute;
    bottom: -1.5px; left: 0; width: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 1px;
    transition: width .25s cubic-bezier(.34, 1.56, .64, 1);
  }
  .field.focused::after,
  .field:hover::after { width: 100%; }
  .field.focused { border-bottom-color: transparent; }

  /* Invalid state */
  .field.invalid { border-bottom-color: rgba(220,38,38,.4); }
  .field.invalid::after { background: var(--accent); width: 100%; }

  .field .err-msg {
    margin-top: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--accent-text);
    display: flex; align-items: center; gap: 6px;
  }

  /* Footer with cta-like row */
  .form-foot {
    margin-top: 22px;
    display: flex; align-items: center; gap: 14px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--fg-muted);
  }
  .form-foot i { color: var(--accent); }
</style></head><body>

<div class="pv-card">

  <div class="form-head">
    <div class="title">Vault entry</div>
    <div class="progress">Step <b>02</b> of 04</div>
  </div>

  <div class="field focused">
    <div class="lbl"><span class="idx">01</span> Email address<span class="req">*</span><span class="helper">encrypted in transit</span></div>
    <div class="input-row">
      <input type="email" value="sarah.chen@emd.health">
      <div class="status ok"><i class="bi bi-check2"></i></div>
    </div>
  </div>

  <div class="field invalid">
    <div class="lbl"><span class="idx">02</span> Vault passphrase<span class="req">*</span><span class="helper">min 12 characters</span></div>
    <div class="input-row">
      <input type="password" value="••••••••">
      <div class="status err"><i class="bi bi-exclamation-lg"></i></div>
    </div>
    <div class="err-msg"><i class="bi bi-shield-exclamation"></i> Add 4 more characters and a symbol</div>
  </div>

  <div class="field">
    <div class="lbl"><span class="idx">03</span> Emergency contact</div>
    <div class="input-row">
      <input type="tel" placeholder="+1 (555) 000-0000">
    </div>
  </div>

  <div class="form-foot">
    <i class="bi bi-shield-lock-fill"></i>
    <span>256-bit · HIPAA-compliant · never sold</span>
  </div>

</div>

</body></html>
